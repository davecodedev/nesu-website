</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: &quot;1100px&quot;, &quot;height&quot;: &quot;700px&quot;}, &quot;onDone&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { lang: 'en', phase: 'idle', entered: false, px: 252, py: 506, pr: 80, flash: false, isMobile: false, plugSel: false, sockArm: false };
  canvasRef = React.createRef();
  svgRef = React.createRef();
  tiltRef = React.createRef();
  reduced = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  async componentDidMount() {
    // Camera dolly-in: give the browser one painted frame at the "far" pose first.
    if (this.reduced) this.setState({ entered: true });
    else requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ entered: true })));
    this.bindTilt();
    this._mq = window.matchMedia('(max-width: 720px), (pointer: coarse)');
    this._onMq = () => this.setState({ isMobile: this._mq.matches });
    this._onMq();
    this._mq.addEventListener('change', this._onMq);
    const m = await import(new URL('i18n.js', document.baseURI).href);
    this.m = m;
    this.setState({ lang: m.getLang() });
    this._unsub = m.onLangChange((l) => this.setState({ lang: l }));
    await m.load();
    this.forceUpdate();
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._onTiltMove) window.removeEventListener('pointermove', this._onTiltMove);
    (this._timers || []).forEach(clearTimeout);
    if (this._mq) this._mq.removeEventListener('change', this._onMq);
    this.unbindDrag();
  }

  later(fn, ms) {
    this._timers = this._timers || [];
    this._timers.push(setTimeout(fn, ms));
  }

  // Mouse-parallax camera tilt (fine pointers only). The tilt element carries a
  // CSS transition, so writing the target rotation directly on each pointermove
  // gives smooth eased pursuit with no animation loop. Levels out while the plug
  // is being dragged so the pointer→SVG mapping stays exact.
  bindTilt() {
    const fine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if (this.reduced || !fine) return;
    this._onTiltMove = (e) => {
      const el = this.tiltRef.current;
      if (!el) return;
      if (this._drag) { el.style.transform = 'rotateY(0deg) rotateX(0deg)'; return; }
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = (e.clientY / window.innerHeight) * 2 - 1;
      el.style.transform = 'rotateY(' + (nx * 5).toFixed(3) + 'deg) rotateX(' + (ny * -3.5).toFixed(3) + 'deg)';
    };
    window.addEventListener('pointermove', this._onTiltMove, { passive: true });
  }

  // --- tiny synth sound effects (no assets) ---
  audio() {
    if (!this._ac) {
      try { this._ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (this._ac && this._ac.state === 'suspended') this._ac.resume();
    return this._ac;
  }

  tone(type, f0, f1, dur, vol, when) {
    const ac = this.audio();
    if (!ac) return;
    const t = ac.currentTime + (when || 0);
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur + 0.05);
  }

  noise(dur, vol, freq, when) {
    const ac = this.audio();
    if (!ac) return;
    const t = ac.currentTime + (when || 0);
    const n = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < n; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const f = ac.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = freq;
    const g = ac.createGain(); g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start(t);
  }

  sndThunk() { this.tone('triangle', 150, 55, 0.14, 0.35); this.noise(0.06, 0.25, 900); }
  sndPower() { this.tone('square', 330, 660, 0.16, 0.12); this.tone('sine', 880, 1320, 0.25, 0.1, 0.12); }
  sndBurst() {
    this.noise(0.5, 0.3, 2400);
    this.tone('sine', 1200, 500, 0.4, 0.08);
    for (let i = 0; i < 5; i++) this.tone('triangle', 1400 + Math.random() * 900, 900, 0.12, 0.06, 0.08 + i * 0.07);
  }

  // --- plug drag / click ---
  toSvg(e) {
    const svg = this.svgRef.current;
    if (!svg) return { x: 0, y: 0 };
    const pt = new DOMPoint(e.clientX, e.clientY).matrixTransform(svg.getScreenCTM().inverse());
    return { x: pt.x, y: pt.y };
  }

  grabPlug = (e) => {
    if (this.state.phase !== 'idle') return;
    e.preventDefault();
    this.audio();
    const start = this.toSvg(e);
    this._drag = { sx: start.x, sy: start.y, ox: this.state.px, oy: this.state.py, moved: false };
    this._onMove = (ev) => {
      const p = this.toSvg(ev);
      const nx = Math.min(920, Math.max(40, this._drag.ox + p.x - this._drag.sx));
      const ny = Math.min(575, Math.max(300, this._drag.oy + p.y - this._drag.sy));
      if (Math.abs(nx - this._drag.ox) + Math.abs(ny - this._drag.oy) > 6) this._drag.moved = true;
      const dist = Math.hypot(nx - 170, ny - 436);
      this.setState({ px: nx, py: ny, pr: Math.min(80, (dist / 220) * 80) });
    };
    this._onUp = () => {
      const moved = this._drag && this._drag.moved;
      this.unbindDrag();
      const { px, py } = this.state;
      const dist = Math.hypot(px - 170, py - 436);
      if (!moved) this.tapPlug();
      else if (dist < 60) this.connectPlug();
      else this.snapTo(252, 506, 80, false);
    };
    window.addEventListener('pointermove', this._onMove);
    window.addEventListener('pointerup', this._onUp);
  };

  connectPlug() {
    this.setState({ plugSel: false, sockArm: false });
    this.snapTo(170, 436, 0, true);
  }

  tapPlug() {
    if (this.state.phase !== 'idle') return;
    if (this.state.isMobile) {
      if (this.state.sockArm) this.connectPlug();
      else this.setState({ plugSel: !this.state.plugSel });
    } else {
      this.connectPlug();
    }
  }

  tapSocket = () => {
    if (this.state.phase !== 'idle') return;
    if (this.state.plugSel) this.connectPlug();
    else if (this.state.isMobile) this.setState({ sockArm: true });
  };

  unbindDrag() {
    if (this._onMove) window.removeEventListener('pointermove', this._onMove);
    if (this._onUp) window.removeEventListener('pointerup', this._onUp);
    this._onMove = null; this._onUp = null;
    this._drag = null;
  }

  snapTo(tx, ty, tr, isSocket) {
    this.setState({ phase: 'plugging' });
    const from = { px: this.state.px, py: this.state.py, pr: this.state.pr };
    const dur = isSocket ? 380 : 420;
    const startT = performance.now();
    const backOut = (t) => { const s = 1.9; t -= 1; return t * t * ((s + 1) * t + s) + 1; };
    const step = (now) => {
      const t = Math.min(1, (now - startT) / dur);
      const e = backOut(t);
      this.setState({
        px: from.px + (tx - from.px) * e,
        py: from.py + (ty - from.py) * e,
        pr: from.pr + (tr - from.pr) * e
      });
      if (t < 1) {
        this._raf = requestAnimationFrame(step);
      } else if (isSocket) {
        this.setState({ phase: 'plugged', flash: true, px: tx, py: ty, pr: tr });
        this.sndThunk();
        this.later(() => this.setState({ flash: false }), 380);
      } else {
        this.setState({ phase: 'idle', px: tx, py: ty, pr: tr });
      }
    };
    this._raf = requestAnimationFrame(step);
  }

  clickPower = () => {
    if (this.state.phase !== 'plugged') return;
    this.setState({ phase: 'powered' });
    this.sndPower();
    this.later(() => { this.burst(); this.sndBurst(); }, 300);
    this.later(() => this.setState({ phase: 'closing' }), 1650);
    this.later(() => this.finish(), 2950);
  };

  finish = () => {
    try { sessionStorage.setItem('nesu-intro-seen', '1'); } catch (e) {}
    if (this.props.onDone) this.props.onDone();
  };

  skip = () => { this.finish(); };

  burst() {
    const canvas = this.canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const ctx = canvas.getContext('2d');
    const svg = this.svgRef.current;
    let cx = rect.width / 2, cy = rect.height * 0.55, k = rect.width / 960;
    if (svg) {
      const ctm = svg.getScreenCTM();
      const p = new DOMPoint(480, 326).matrixTransform(ctm);
      const r0 = new DOMPoint(0, 0).matrixTransform(ctm);
      const r1 = new DOMPoint(100, 0).matrixTransform(ctm);
      cx = p.x - rect.left; cy = p.y - rect.top; k = (r1.x - r0.x) / 100;
    }
    const colors = ['#94A3B8', '#C9D2DD', '#00A3A3', '#D4AF37'];
    const parts = [];
    for (let i = 0; i < 46; i++) {
      const a = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.6;
      const sp = (240 + Math.random() * 420) * k;
      parts.push({
        x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 10,
        r: (6 + Math.random() * 6) * k,
        nut: Math.random() < 0.5,
        c: colors[Math.floor(Math.random() * colors.length)]
      });
    }
    const g = 1050 * k;
    let last = performance.now();
    const t0 = last;
    const draw = (now) => {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      const age = (now - t0) / 1000;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const alpha = age < 1.1 ? 1 : Math.max(0, 1 - (age - 1.1) / 0.6);
      for (const p of parts) {
        p.vy += g * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.c;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const ang = (Math.PI / 3) * i;
          const x = Math.cos(ang) * p.r, y = Math.sin(ang) * p.r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
        if (p.nut) {
          ctx.globalCompositeOperation = 'destination-out';
          ctx.beginPath(); ctx.arc(0, 0, p.r * 0.42, 0, Math.PI * 2); ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
        } else {
          ctx.fillRect(-p.r * 0.22, p.r * 0.6, p.r * 0.44, p.r * 1.2);
        }
        ctx.restore();
      }
      if (age < 1.8) this._raf = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
    this._raf = requestAnimationFrame(draw);
  }

  renderVals() {
    const m = this.m;
    const t = (k) => (m ? m.t(this.state.lang, k) : '');
    const { phase, px, py, pr, flash, entered } = this.state;
    const powered = phase === 'powered' || phase === 'closing';
    const closing = phase === 'closing';
    const rad = (pr * Math.PI) / 180;
    const ax = px - 22 * Math.sin(rad);
    const ay = py + 22 * Math.cos(rad);
    const hint = phase === 'idle' || phase === 'plugging' ? t('intro.step1') : phase === 'plugged' ? t('intro.step2') : '';
    const shK = Math.min(1, Math.max(0, (py - 430) / 145));
    return {
      vb: this.state.isMobile ? '110 30 700 570' : '0 0 960 600',
      par: this.state.isMobile ? 'xMidYMid meet' : 'xMidYMax slice',
      plugHitR: this.state.isMobile ? 55 : 34,
      plugStroke: this.state.plugSel ? '#00A3A3' : '#94A3B8',
      sockPulseAnim: phase === 'idle' && (this.state.plugSel || this.state.sockArm) ? 'nesuPulse 1.2s ease-in-out infinite' : 'none',
      tapSocket: this.tapSocket,
      skip: this.skip,
      grabPlug: this.grabPlug,
      clickPower: this.clickPower,
      canvasRef: this.canvasRef,
      svgRef: this.svgRef,
      tiltRef: this.tiltRef,
      skipLabel: t('intro.skip'),
      hintText: hint,
      px, py,
      plugAttr: 'translate(' + px + ' ' + py + ') rotate(' + pr + ')',
      cableD: 'M 706 462 C 610 552, 460 560, ' + ax + ' ' + ay,
      plugPulseAnim: phase === 'idle' ? 'nesuPulse 1.6s ease-in-out infinite' : 'none',
      plugCursor: phase === 'idle' ? 'grab' : 'default',
      btnPulseAnim: phase === 'plugged' ? 'nesuBtnPulse 1.4s ease-in-out infinite' : 'none',
      btnFill: powered ? '#00A3A3' : '#0B1626',
      btnIconStroke: powered ? '#0E2344' : '#7A8CA6',
      socketStroke: flash ? '#00A3A3' : '#4B5563',
      screenFill: powered ? '#0E2344' : '#0B1626',
      screenGlowOpacity: powered ? 0.08 : 0,
      wmOpacity: powered ? 1 : 0,
      roomGlow: powered ? 0.05 : 0,
      shadowRx: 16 + 14 * shK,
      shadowOp: (0.3 * shK).toFixed(3),
      cameraTransform: closing
        ? 'translateZ(720px) rotateX(-7deg)'
        : entered
          ? 'rotateX(0deg) translateY(0px) translateZ(0px)'
          : 'rotateX(16deg) translateY(-36px) translateZ(-430px)',
      cameraTransition: closing
        ? 'transform 1.25s cubic-bezier(0.55, 0, 0.85, 0.4)'
        : 'transform 1.45s cubic-bezier(0.16, 0.85, 0.25, 1)',
      veilOpacity: entered ? 0 : 1,
      hintOpacity: entered && !closing ? 1 : 0,
      rootOpacity: closing ? 0 : 1
    };
  }
}
</script>
