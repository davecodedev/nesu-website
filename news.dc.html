<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>News — NESU</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: var(--bg); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    a { color: var(--blue); }
    a:hover { color: var(--text); }
  </style>
</helmet>
<div style="min-height: 100vh; display: flex; flex-direction: column; background: var(--panel)">
  <dc-import name="Header" active="news" hint-size="100%,80px"></dc-import>
  <main data-screen-label="News" style="flex: 1">
    <section style="max-width: 1280px; margin: 0 auto; padding: 80px 32px 0">
      <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00A3A3" data-reveal>{{ kicker }}</span>
      <h1 data-reveal style="margin: 16px 0 0; font-size: clamp(32px, 7vw, 44px); font-weight: 700; letter-spacing: -0.01em; color: var(--text); text-wrap: pretty">{{ title }}</h1>
      <p data-reveal style="margin: 20px 0 0; font-size: 17px; line-height: 1.6; color: var(--text-2); max-width: 620px; text-wrap: pretty">{{ intro }}</p>
    </section>
    <section style="max-width: 1280px; margin: 48px auto 0; padding: 0 32px 104px; display: flex; flex-direction: column">
      <sc-for list="{{ items }}" as="n" hint-placeholder-count="10">
        <a href="{{ n.url }}" target="_blank" rel="noopener" style="display: grid; grid-template-columns: {{ rowCols }}; gap: 16px 32px; align-items: baseline; padding: 26px 8px; border-top: 1px solid var(--border); text-decoration: none" style-hover="background: var(--bg-subtle)">
          <div style="display: flex; flex-direction: column; gap: 8px">
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #00A3A3; border: 1px solid var(--teal-border); border-radius: 3px; padding: 3px 8px; align-self: flex-start">{{ n.category }}</span>
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-2)">{{ n.date }}</span>
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px">
            <span style="font-size: 19px; font-weight: 600; line-height: 1.35; color: var(--text); text-wrap: pretty">{{ n.title }}</span>
            <span style="font-size: 14.5px; line-height: 1.6; color: var(--text-2); text-wrap: pretty">{{ n.summary }}</span>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px; text-align: {{ metaAlign }}">
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text)">{{ n.source }}</span>
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--blue)">{{ readSource }} ↗</span>
          </div>
        </a>
      </sc-for>
      <div style="border-top: 1px solid var(--border)"></div>
    </section>
  </main>
  <dc-import name="Footer" hint-size="100%,480px"></dc-import>
  <dc-import name="Assistant" hint-size="72px,72px"></dc-import>
  <dc-import name="TestNote" hint-size="72px,32px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { lang: 'en', items: [], isMobile: false };

  async componentDidMount() {
    this._mq = window.matchMedia('(max-width: 820px)');
    this._onMq = () => this.setState({ isMobile: this._mq.matches });
    this._onMq();
    this._mq.addEventListener('change', this._onMq);
    const m = await import(new URL('i18n.js', document.baseURI).href);
    const nd = await import(new URL('news-data.js', document.baseURI).href);
    this.m = m;
    this.setState({ lang: m.getLang() });
    this._unsub = m.onLangChange((l) => this.setState({ lang: l }));
    const [items] = await Promise.all([nd.getNewsItems(), m.load()]);
    this.setState({ items });
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
    if (this._mq) this._mq.removeEventListener('change', this._onMq);
  }

  renderVals() {
    const m = this.m;
    const t = (k) => (m ? m.t(this.state.lang, k) : '');
    return {
      kicker: t('nav.news') ? '04 — ' + t('nav.news') : '',
      title: t('news.title'),
      intro: t('news.intro'),
      readSource: t('news.readSource'),
      rowCols: this.state.isMobile ? '1fr' : '200px 1fr 170px',
      metaAlign: this.state.isMobile ? 'left' : 'right',
      items: this.state.items
    };
  }
}
</script>
</body>
</html>
