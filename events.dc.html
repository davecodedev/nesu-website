<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Events — NESU</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: var(--bg); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    a { color: var(--blue); }
    a:hover { color: var(--text); }
  </style>
</helmet>
<div style="min-height: 100vh; display: flex; flex-direction: column; background: var(--panel)">
  <dc-import name="Header" active="events" hint-size="100%,80px"></dc-import>
  <main data-screen-label="Events" style="flex: 1">
    <section style="max-width: 1280px; margin: 0 auto; padding: 64px 32px 48px; box-sizing: border-box">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(min(440px, 100%), 1fr)); gap: clamp(32px, 5vw, 64px); align-items: center; min-height: 64vh">
        <div style="display: flex; flex-direction: column; gap: 18px; min-width: 0">
          <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00A3A3">{{ kicker }}</span>
          <h1 style="margin: 0; font-size: clamp(32px, 7vw, 48px); font-weight: 700; letter-spacing: -0.01em; color: var(--text); text-wrap: pretty">{{ title }}</h1>
          <p style="margin: 0; font-size: 17px; line-height: 1.6; color: var(--text-2); max-width: 560px; text-wrap: pretty">{{ intro }}</p>
          <p style="margin: 0; font-size: 15.5px; line-height: 1.65; color: var(--text-2); max-width: 540px; text-wrap: pretty">{{ introExtra }}</p>
          <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px">
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px">{{ stat1 }}</span>
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px">{{ stat2 }}</span>
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px">{{ stat3 }}</span>
          </div>
          <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px; max-width: 480px; border: 1px solid var(--border-2); border-radius: 3px; padding: 0 14px; background: var(--panel)">
            <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; flex: none; color: var(--text-2)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="10.5" cy="10.5" r="6.5"></circle>
              <line x1="15.5" y1="15.5" x2="21" y2="21"></line>
            </svg>
            <input value="{{ query }}" onChange="{{ onQuery }}" placeholder="{{ searchPlaceholder }}" style="flex: 1; border: none; outline: none; font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 15px; color: var(--text); padding: 12px 0; background: transparent">
          </div>
        </div>
        <div style="position: relative; height: clamp(340px, 42vw, 480px)">
          <div style="position: absolute; top: 0; right: 0; width: 76%; height: 80%; border-radius: 8px; overflow: hidden; box-shadow: 0 28px 54px -18px rgba(14,35,68,0.35)">
            <img src="photos/photo_60@15-04-2026_19-05-05.jpg" alt="NESU seminar in Bukhara" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block" />
          </div>
          <div style="position: absolute; bottom: 0; left: 0; width: 54%; height: 46%; border-radius: 8px; overflow: hidden; border: 5px solid var(--panel); box-shadow: 0 20px 40px -16px rgba(14,35,68,0.4)">
            <img src="photos/photo_90@17-05-2026_22-28-33.jpg" alt="NESU webinar series session" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block" />
          </div>
        </div>
      </div>
    </section>
    <section style="max-width: 1280px; margin: 40px auto 0; padding: 0 32px 104px">
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px">
        <sc-for list="{{ cards }}" as="ev" hint-placeholder-count="6">
          <a href="{{ ev.href }}" style="display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; text-decoration: none; background: var(--panel)" style-hover="border-color: var(--blue)">
            <sc-if value="{{ ev.hasCover }}" hint-placeholder-val="{{ false }}">
              <div style="width: 100%; height: 170px; background-image: {{ ev.coverBg }}; background-size: cover; background-position: center"></div>
            </sc-if>
            <sc-if value="{{ ev.noCover }}" hint-placeholder-val="{{ true }}">
              <div style="width: 100%; height: 170px; display: flex; align-items: flex-end; padding: 14px; box-sizing: border-box; background-color: #10264C; background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 10px)">
                <span style="font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #7A8CA6">NESU</span>
              </div>
            </sc-if>
            <div style="display: flex; flex-direction: column; gap: 8px; padding: 20px 22px 22px">
              <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--blue)">{{ ev.date }}</span>
              <span style="font-size: 18px; font-weight: 600; line-height: 1.35; color: var(--text); text-wrap: pretty">{{ ev.title }}</span>
              <sc-if value="{{ ev.hasLoc }}" hint-placeholder-val="{{ false }}">
                <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-2)">{{ ev.loc }}</span>
              </sc-if>
            </div>
          </a>
        </sc-for>
      </div>
      <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
        <div style="border: 1px dashed var(--border-2); border-radius: 4px; padding: 56px 32px; display: flex; justify-content: center">
          <span style="font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-2)">{{ noResultsMsg }}</span>
        </div>
      </sc-if>
    </section>
  </main>
  <dc-import name="Footer" hint-size="100%,480px"></dc-import>
  <dc-import name="Assistant" hint-size="72px,72px"></dc-import>
  <dc-import name="TestNote" hint-size="72px,32px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { lang: 'en', query: '', events: [] };

  async componentDidMount() {
    const m = await import(new URL('i18n.js', document.baseURI).href);
    const cms = await import(new URL('cms-store.js', document.baseURI).href);
    const fz = await import(new URL('fuzzy.js', document.baseURI).href);
    this.m = m;
    this.fz = fz;
    const events = await cms.getPublishedEvents();
    this.setState({ lang: m.getLang(), events });
    this._unsub = m.onLangChange((l) => this.setState({ lang: l }));
    await m.load();
    this.forceUpdate();
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
  }

  renderVals() {
    const m = this.m;
    const t = (k) => (m ? m.t(this.state.lang, k) : '');
    const lang = this.state.lang;
    let list = this.state.events;
    if (this.fz && this.state.query.trim()) {
      list = this.fz.fuzzyFilter(this.state.query, list, (e) =>
        [e.title.en, e.title.uz, e.title.ru].join(' '));
    }
    const cards = list.map((e) => {
      const cover = (e.photos && e.photos[0]) || '';
      return {
        href: 'event-detail.dc.html?slug=' + e.slug,
        date: e.date,
        title: e.title[lang] || e.title.en,
        loc: e.loc || '',
        hasLoc: !!e.loc,
        coverBg: cover ? 'url("' + cover + '")' : 'none',
        hasCover: !!cover,
        noCover: !cover
      };
    });
    return {
      kicker: t('nav.events') ? '02 — ' + t('nav.events') : '',
      title: t('events.title'),
      intro: t('events.intro'),
      introExtra: t('events.introExtra'),
      stat1: t('events.stat1'),
      stat2: t('events.stat2'),
      stat3: t('events.stat3'),
      searchPlaceholder: t('events.searchPlaceholder'),
      noResultsMsg: t('events.noResults'),
      query: this.state.query,
      onQuery: (ev) => this.setState({ query: ev.target.value }),
      cards,
      noResults: cards.length === 0 && !!this.state.query.trim()
    };
  }
}
</script>
</body>
</html>
