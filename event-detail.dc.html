<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Event — NESU</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: var(--bg); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    a { color: var(--blue); }
    a:hover { color: var(--text); }
  </style>
</helmet>
<div style="min-height: 100vh; display: flex; flex-direction: column; background: var(--panel)">
  <dc-import name="Header" active="events" hint-size="100%,80px"></dc-import>
  <main data-screen-label="Event Detail" style="flex: 1">
    <section style="max-width: 900px; margin: 0 auto; padding: 72px 32px 104px">
      <a href="events.dc.html" style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: var(--blue); text-decoration: none">← {{ backLabel }}</a>
      <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px">
        <h1 style="margin: 0; font-size: 42px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); text-wrap: pretty">{{ title }}</h1>
        <div style="display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; justify-content: center">
          <span style="font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--blue)">{{ date }}</span>
          <sc-if value="{{ hasLoc }}" hint-placeholder-val="{{ false }}">
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-2)">{{ loc }}</span>
          </sc-if>
        </div>
        <p style="margin: 8px 0 0; font-size: 17px; line-height: 1.65; color: var(--text-2); max-width: 640px; text-wrap: pretty">{{ desc }}</p>
      </div>
      <sc-if value="{{ hasPhotos }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top: 56px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px">
          <sc-for list="{{ photos }}" as="ph" hint-placeholder-count="3">
            <button onClick="{{ ph.open }}" style="padding: 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; cursor: zoom-in; background: #10264C; height: 180px" style-hover="border-color: var(--blue)">
              <div style="width: 100%; height: 100%; background-image: {{ ph.bg }}; background-size: cover; background-position: center"></div>
            </button>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ noPhotos }}" hint-placeholder-val="{{ false }}">
        <div style="margin-top: 56px; border: 1px dashed var(--border-2); border-radius: 4px; padding: 56px 32px; display: flex; justify-content: center">
          <span style="font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-2)">{{ placeholder }}</span>
        </div>
      </sc-if>
    </section>
    <sc-if value="{{ lightboxOpen }}" hint-placeholder-val="{{ false }}">
      <div onClick="{{ closeLightbox }}" style="position: fixed; inset: 0; z-index: 500; background: rgba(10, 24, 48, 0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; cursor: zoom-out; padding: 32px; box-sizing: border-box">
        <div style="width: min(90vw, 1000px); height: 74vh; background-image: {{ lightboxBg }}; background-size: contain; background-repeat: no-repeat; background-position: center; border: 1px solid rgba(255,255,255,0.25); border-radius: 4px"></div>
        <span style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: #7A8CA6">ESC / CLICK</span>
      </div>
    </sc-if>
  </main>
  <dc-import name="Footer" hint-size="100%,480px"></dc-import>
  <dc-import name="Assistant" hint-size="72px,72px"></dc-import>
  <dc-import name="TestNote" hint-size="72px,32px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { lang: 'en', ev: null, lightbox: null };

  async componentDidMount() {
    const m = await import(new URL('i18n.js', document.baseURI).href);
    const cms = await import(new URL('cms-store.js', document.baseURI).href);
    this.m = m;
    let slug = '';
    try {
      const p = new URLSearchParams(window.location.search);
      slug = p.get('slug') || p.get('id') || '';
    } catch (e) {}
    let ev = await cms.getEventBySlug(slug);
    if (!ev) {
      const pub = await cms.getPublishedEvents();
      ev = pub[0] || null;
    }
    this.setState({ lang: m.getLang(), ev });
    this._unsub = m.onLangChange((l) => this.setState({ lang: l }));
    this._onKey = (e) => { if (e.key === 'Escape') this.setState({ lightbox: null }); };
    window.addEventListener('keydown', this._onKey);
    await m.load();
    this.forceUpdate();
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
    window.removeEventListener('keydown', this._onKey);
  }

  renderVals() {
    const m = this.m;
    const t = (k) => (m ? m.t(this.state.lang, k) : '');
    const lang = this.state.lang;
    const ev = this.state.ev || { title: {}, desc: {}, photos: [], date: '', loc: '' };
    const photos = (ev.photos || []).map((src) => ({
      bg: 'url("' + src + '")',
      open: () => this.setState({ lightbox: src })
    }));
    return {
      backLabel: t('events.title'),
      title: ev.title[lang] || ev.title.en || '',
      date: ev.date || '',
      loc: ev.loc || '',
      hasLoc: !!ev.loc,
      desc: ev.desc[lang] || ev.desc.en || '',
      photos,
      hasPhotos: photos.length > 0,
      noPhotos: photos.length === 0,
      placeholder: t('common.placeholder'),
      lightboxOpen: !!this.state.lightbox,
      lightboxBg: this.state.lightbox ? 'url("' + this.state.lightbox + '")' : 'none',
      closeLightbox: () => this.setState({ lightbox: null })
    };
  }
}
</script>
</body>
</html>
