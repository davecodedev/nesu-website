<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF; --bg-subtle: #F7F9FB; --panel: #FFFFFF;
      --text: #0E2344; --text-2: #4B5563;
      --border: #E2E6EC; --border-2: #C9D2DD;
      --blue: #0057B8; --teal-border: #B3E4E4; --teal-bg: #EAF6F6;
      --header-bg: rgba(255, 255, 255, 0.96);
    }
    html[data-nesu-theme="dark"] {
      --bg: #0B1626; --bg-subtle: #0F2140; --panel: #122A50;
      --text: #E8EEF6; --text-2: #A5B4C8;
      --border: #26436F; --border-2: #33517F;
      --blue: #6FB1FF; --teal-border: #1C6060; --teal-bg: #0E3535;
      --header-bg: rgba(11, 22, 38, 0.94);
    }
    body { margin: 0; font-family: 'IBM Plex Sans', system-ui, sans-serif; background: var(--bg); }
    input, textarea, select { background-color: var(--panel); color: var(--text); caret-color: var(--text); }
    html[data-nesu-cursor="1"], html[data-nesu-cursor="1"] * { cursor: none !important; }
    @media (prefers-reduced-motion: no-preference) {
      [data-reveal] { opacity: 0; transform: translateY(26px); transition: opacity 0.75s cubic-bezier(0.2, 0.65, 0.25, 1), transform 0.75s cubic-bezier(0.2, 0.65, 0.25, 1); }
      [data-reveal="in"] { opacity: 1; transform: translateY(0); }
    }
  </style>
</helmet>
<div data-nesu-cursor-el="1" style="position: fixed; top: 0; left: 0; z-index: 6000; width: 36px; height: 36px; margin: -9px 0 0 -9px; pointer-events: none; opacity: 0; transition: opacity 0.25s ease">
  <svg data-nesu-cursor-tool="1" viewBox="0 0 24 24" style="width: 36px; height: 36px; display: block; transform: scaleX(-1) rotate(0deg); transform-origin: 30% 30%; transition: transform 0.16s ease" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke="var(--bg)" stroke-width="5" opacity="0.9"></path>
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke="var(--text)" stroke-width="2.2" fill="rgba(0, 87, 184, 0.18)"></path>
  </svg>
  <span data-nesu-cursor-tag="1" style="position: absolute; top: 100%; left: 100%; margin: 2px 0 0 2px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; white-space: nowrap; background: #0E2344; color: #00A3A3; border: 1px solid #00A3A3; border-radius: 2px; padding: 2px 6px; opacity: 0; transition: opacity 0.15s ease"></span>
</div>
<canvas data-nesu-spark="1" style="position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 5990; pointer-events: none"></canvas>
<header style="position: sticky; top: 0; z-index: 100; background: var(--header-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border)">

            <circle cx="12" cy="12" r="4.5"></circle>
            <line x1="12" y1="2.5" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="21.5"></line>
            <line x1="2.5" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="21.5" y2="12"></line>
            <line x1="5.3" y1="5.3" x2="7" y2="7"></line><line x1="17" y1="17" x2="18.7" y2="18.7"></line>
            <line x1="18.7" y1="5.3" x2="17" y2="7"></line><line x1="7" y1="17" x2="5.3" y2="18.7"></line>
          </svg>
        </sc-if>
        <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}">
          <svg viewBox="0 0 24 24" style="width: 15px; height: 15px" fill="currentColor">

      <a href="contact.dc.html" style="flex: none; background: #0057B8; color: #FFFFFF; text-decoration: none; font-size: 13.5px; font-weight: 600; padding: 10px 18px; border-radius: 3px; white-space: nowrap" style-hover="background: #0E2344">{{ join }}</a>
    </div>
  </sc-if>
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
    <div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px">
      <a href="index.dc.html" style="display: flex; align-items: center; text-decoration: none; flex: none">
        <svg viewBox="0 0 234 70" style="height: 20px; width: auto; display: block; color: var(--text)" fill="currentColor" aria-label="NESU">
          <rect x="0" y="0" width="12" height="70"></rect>
          <rect x="36" y="0" width="12" height="70"></rect>
          <polygon points="14,2 24,2 34,68 24,68"></polygon>
          <rect x="62" y="0" width="12" height="70"></rect>
          <rect x="78" y="0" width="30" height="12"></rect>
          <rect x="78" y="29" width="24" height="12"></rect>
          <rect x="78" y="58" width="30" height="12"></rect>
          <rect x="124" y="0" width="48" height="12"></rect>
          <rect x="124" y="15" width="12" height="11"></rect>
          <rect x="124" y="29" width="48" height="12"></rect>
          <rect x="160" y="44" width="12" height="11"></rect>
          <rect x="124" y="58" width="48" height="12"></rect>
          <rect x="186" y="0" width="12" height="55"></rect>
          <rect x="222" y="0" width="12" height="55"></rect>
          <rect x="186" y="58" width="48" height="12"></rect>
        </svg>
      </a>
      <div style="display: flex; flex: none; border: 1px solid var(--border-2); border-radius: 3px; overflow: hidden; margin-left: auto">
        <sc-for list="{{ langs }}" as="lg" hint-placeholder-count="3">
          <button onClick="{{ lg.pick }}" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 8px 10px; background: {{ lg.bg }}; color: {{ lg.color }}; border: none; cursor: pointer">{{ lg.code }}</button>
        </sc-for>
      </div>
      <button onClick="{{ toggleTheme }}" aria-label="Toggle dark mode" style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--border-2); border-radius: 3px; cursor: pointer; color: var(--text-2); flex: none; padding: 0">
        <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}">
          <svg viewBox="0 0 24 24" style="width: 17px; height: 17px" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4.5"></circle>
            <line x1="12" y1="2.5" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="21.5"></line>
            <line x1="2.5" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="21.5" y2="12"></line>
            <line x1="5.3" y1="5.3" x2="7" y2="7"></line><line x1="17" y1="17" x2="18.7" y2="18.7"></line>
            <line x1="18.7" y1="5.3" x2="17" y2="7"></line><line x1="7" y1="17" x2="5.3" y2="18.7"></line>
          </svg>
        </sc-if>
        <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}">
          <svg viewBox="0 0 24 24" style="width: 17px; height: 17px" fill="currentColor">
            <path d="M20 14.5 A8.5 8.5 0 1 1 9.5 4 A7 7 0 0 0 20 14.5 Z"></path>
          </svg>
        </sc-if>
      </button>
      <button onClick="{{ toggleMenu }}" aria-label="Menu" style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--border-2); border-radius: 3px; cursor: pointer; flex: none">
        <sc-if value="{{ menuClosed }}" hint-placeholder-val="{{ true }}">
          <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; color: var(--text)" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="7" x2="20" y2="7"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="17" x2="20" y2="17"></line>
          </svg>
        </sc-if>
        <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
          <span style="font-size: 20px; line-height: 1; color: var(--text)">×</span>
        </sc-if>
      </button>
    </div>
    <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
      <nav style="display: flex; flex-direction: column; padding: 0 16px 16px; background: var(--panel); max-height: calc(100vh - 70px); overflow-y: auto" aria-label="Main">
        <sc-for list="{{ mobileNav }}" as="item" hint-placeholder-count="9">
          <a href="{{ item.href }}" style="font-size: 16px; font-weight: 600; color: {{ item.color }}; text-decoration: none; padding: 14px 4px; border-top: 1px solid var(--border)">{{ item.label }}</a>
        </sc-for>
        <a href="contact.dc.html" style="margin-top: 14px; background: #0057B8; color: #FFFFFF; text-decoration: none; font-size: 15px; font-weight: 600; padding: 13px 18px; border-radius: 3px; text-align: center">{{ join }}</a>
      </nav>
    </sc-if>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: &quot;1280px&quot;, &quot;height&quot;: &quot;160px&quot;}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;about&quot;, &quot;events&quot;, &quot;competitions&quot;, &quot;news&quot;, &quot;fields&quot;, &quot;gallery&quot;, &quot;qa&quot;, &quot;contact&quot;], &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Navigation&quot;}}">
class Component extends DCLogic {
  state = { lang: 'en', scrolled: false, isMobile: false, menuOpen: false };

  async componentDidMount() {
    this._onScroll = () => {
      const s = window.scrollY > 24;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._mq = window.matchMedia('(max-width: 900px)');
    this._onMq = () => this.setState({ isMobile: this._mq.matches });
    this._onMq();
    this._mq.addEventListener('change', this._onMq);
    // Scroll-reveal: elements with [data-reveal] rise in as they enter the viewport
    {
      const seen = new WeakSet();
      this._revealIO = new IntersectionObserver((entries) => {
        let i = 0;
        entries.forEach((en) => {
          if (!en.isIntersecting) return;
          en.target.style.transitionDelay = (i++ * 0.09) + 's';
          en.target.setAttribute('data-reveal', 'in');
          this._revealIO.unobserve(en.target);
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
      this._revealScan = setInterval(() => {
        document.querySelectorAll('[data-reveal]').forEach((el) => {
          if (seen.has(el) || el.getAttribute('data-reveal') === 'in') return;
          seen.add(el);
          this._revealIO.observe(el);
        });
      }, 350);
    }
    // Custom cursor (fine pointers only) + weld sparks on click/tap (all devices)
    {
      const finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      if (finePointer) document.documentElement.setAttribute('data-nesu-cursor', '1');
      const el = () => document.querySelector('[data-nesu-cursor-el]');
      let x = -100, y = -100, cx = -100, cy = -100, seen = false, hot = false, down = false, tagText = '';
      const sparks = [];
      this._onCursorMove = (e) => { x = e.clientX; y = e.clientY; seen = true; };
      this._onCursorOver = (e) => {
        const it = e.target && e.target.closest && e.target.closest('a, button, [role="button"], input, textarea, select, label');
        hot = !!it;
        if (!it) tagText = '';
        else if (it.matches('input, textarea, select, label')) tagText = 'EDIT';
        else if (it.matches('a') && it.getAttribute('href')) tagText = 'OPEN';
        else tagText = 'PRESS';
      };
      this._onCursorDown = (e) => {
        down = true;
        // weld-spark burst at the click point
        const n = 16 + Math.floor(Math.random() * 8);
        for (let i = 0; i < n; i++) {
          const a = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.7;
          const sp = 140 + Math.random() * 420;
          sparks.push({
            x: e.clientX, y: e.clientY,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 0.35 + Math.random() * 0.45, age: 0
          });
        }
        sparks.push({ flash: true, x: e.clientX, y: e.clientY, life: 0.09, age: 0 });
      };
      this._onCursorUp = () => { down = false; };
      let lastT = performance.now();
      window.addEventListener('mousemove', this._onCursorMove, { passive: true });
      window.addEventListener('mouseover', this._onCursorOver, { passive: true });
      window.addEventListener('pointerdown', this._onCursorDown, { passive: true });
      window.addEventListener('pointerup', this._onCursorUp, { passive: true });
      const tick = () => {
        const now = performance.now();
        const dt = Math.min(0.05, (now - lastT) / 1000);
        lastT = now;
        const cv = document.querySelector('[data-nesu-spark]');
        if (cv) {
          if (cv.width !== window.innerWidth || cv.height !== window.innerHeight) {
            cv.width = window.innerWidth;
            cv.height = window.innerHeight;
          }
          const ctx = cv.getContext('2d');
          ctx.clearRect(0, 0, cv.width, cv.height);
          for (let i = sparks.length - 1; i >= 0; i--) {
            const p = sparks[i];
            p.age += dt;
            if (p.age >= p.life) { sparks.splice(i, 1); continue; }
            const k = 1 - p.age / p.life;
            if (p.flash) {
              ctx.globalAlpha = k * 0.85;
              ctx.fillStyle = '#FFFFFF';
              ctx.beginPath();
              ctx.arc(p.x, p.y, 14 * k + 4, 0, Math.PI * 2);
              ctx.fill();
              continue;
            }
            p.vy += 1150 * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            ctx.globalAlpha = Math.min(1, k * 1.4);
            ctx.strokeStyle = k > 0.55 ? '#FFF6DC' : (k > 0.25 ? '#FFCE6B' : '#D4AF37');
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x - p.vx * 0.022, p.y - p.vy * 0.022);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        const c = el();
        if (c && finePointer) {
          cx += (x - cx) * 0.32;
          cy += (y - cy) * 0.32;
          c.style.transform = 'translate(' + cx + 'px, ' + cy + 'px)';
          c.style.opacity = seen ? '1' : '0';
          const tool = c.querySelector('[data-nesu-cursor-tool]');
          if (tool) {
            // wrench "grips" over interactive elements, "turns" while clicking
            const rot = down ? -50 : (hot ? -22 : 0);
            const scale = hot ? 1.2 : 1;
            tool.style.transform = 'scaleX(-1) rotate(' + rot + 'deg) scale(' + scale + ')';
          }
          const tag = c.querySelector('[data-nesu-cursor-tag]');
          if (tag) {
            if (tagText && tag.textContent !== tagText) tag.textContent = tagText;
            tag.style.opacity = hot && tagText ? '1' : '0';
          }
        }
        this._cursorRaf = requestAnimationFrame(tick);
      };
      this._cursorRaf = requestAnimationFrame(tick);
    }
    let theme = 'light';
    try { theme = localStorage.getItem('nesu-theme') === 'dark' ? 'dark' : 'light'; } catch (e) {}
    document.documentElement.setAttribute('data-nesu-theme', theme);
    this.setState({ theme });
    import(new URL('cms-store.js', document.baseURI).href)
      .then((cms) => cms.getLogos())
      .then((logos) => this.setState({ logos }))
      .catch(() => this.setState({ logos: {} }));
    const m = await import(new URL('i18n.js', document.baseURI).href);
    this.m = m;
    this.setState({ lang: m.getLang() });
    this._unsub = m.onLangChange((l) => this.setState({ lang: l }));
    await m.load();
    this.forceUpdate();
  }

  componentWillUnmount() {
    window.removeEventListener('scroll', this._onScroll);
    if (this._mq) this._mq.removeEventListener('change', this._onMq);
    if (this._revealScan) clearInterval(this._revealScan);
    if (this._revealIO) this._revealIO.disconnect();
    if (this._cursorRaf) cancelAnimationFrame(this._cursorRaf);
    if (this._onCursorMove) {
      window.removeEventListener('mousemove', this._onCursorMove);
      window.removeEventListener('mouseover', this._onCursorOver);
      window.removeEventListener('pointerdown', this._onCursorDown);
      window.removeEventListener('pointerup', this._onCursorUp);
    }
    if (this._unsub) this._unsub();
  }

  renderVals() {
    const m = this.m;
    const t = (k) => (m ? m.t(this.state.lang, k) : '');
    const active = this.props.active ?? 'home';
    const navItems = (m ? m.NAV : []).filter((d) => d.key !== 'home').map((d) => ({
      href: d.href,
      label: t('nav.' + d.key),
      color: d.key === active ? 'var(--blue)' : 'var(--text)',
      border: d.key === active ? '#0057B8' : 'transparent'
    }));
    const mobileNav = (m ? m.NAV : []).map((d) => ({
      href: d.href,
      label: t('nav.' + d.key),
      color: d.key === active ? 'var(--blue)' : 'var(--text)'
    }));
    const langs = ['uz', 'en', 'ru'].map((c) => ({
      code: c.toUpperCase(),
      pick: () => m && m.setLang(c),
      bg: c === this.state.lang ? 'var(--text)' : 'transparent',
      color: c === this.state.lang ? 'var(--bg)' : 'var(--text-2)'
    }));
    const ann = t('brand.annotation');
    const words = ann.split(' ');
    const mid = Math.ceil(words.length / 2);
    const sc = this.state.scrolled;
    const logos = this.state.logos || {};
    if (logos.favicon) {
      const link = document.querySelector('link[rel="icon"]');
      if (link && link.href !== logos.favicon) link.href = logos.favicon;
    }
    const theme = this.state.theme || 'light';
    return {
      isDark: theme === 'dark',
      isLight: theme !== 'dark',
      toggleTheme: () => {
        const next = (this.state.theme || 'light') === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem('nesu-theme', next); } catch (e) {}
        document.documentElement.setAttribute('data-nesu-theme', next);
        this.setState({ theme: next });
      },
      hasLogoImg: !!logos.wordmark,
      logoImg: logos.wordmark || '',
      svgDisplay: logos.wordmark ? 'none' : 'block',
      isDesktop: !this.state.isMobile,
      isMobile: this.state.isMobile,
      menuOpen: this.state.menuOpen,
      menuClosed: !this.state.menuOpen,
      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),
      navItems,
      mobileNav,
      langs,
      join: t('cta.join'),
      annLine1: words.slice(0, mid).join(' '),
      annLine2: words.slice(mid).join(' '),
      padV: sc ? '10px' : '18px',
      logoH: sc ? 20 : 26,
      annDisplay: sc ? 'none' : 'flex'
    };
  }
}
</script>
</body>
</html>
